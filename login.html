<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | PetroTrack</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script defer src="app.js"></script>
</head>
<body class="auth-page">

  <!-- Topbar -->
  <header class="auth-topbar">
    <a href="index.html" class="auth-brand">
      <span class="material-symbols-outlined auth-brand-icon">local_gas_station</span>
      <span class="auth-brand-name">PetroTrack</span>
    </a>
  </header>

  <!-- Main -->
  <main class="auth-main">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-card-logo">
        <div class="auth-logo-icon">
          <span class="material-symbols-outlined">local_gas_station</span>
        </div>
      </div>

      <div class="auth-heading">Welcome Back</div>
      <div class="auth-sub">Sign in to manage your fuel assets</div>

      <!-- Role Tabs -->
      <div class="role-tabs">
        <span class="role-tabs-label">I am a</span>
        <div class="role-tabs-grid">
          <label class="role-tab">
            <input type="radio" name="loginRole" value="customer" checked>
            <div class="role-tab-icon">🚗</div>
            <div class="role-tab-name">Customer</div>
          </label>
          <label class="role-tab">
            <input type="radio" name="loginRole" value="seller">
            <div class="role-tab-icon">🏪</div>
            <div class="role-tab-name">Seller</div>
          </label>
        </div>
      </div>

      <!-- Error -->
      <div class="msg msg-error" id="loginError"></div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Address</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">mail</span>
          <input class="form-input" type="email" id="loginEmail" placeholder="name@company.com">
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--sp-1);">
          <label class="form-label" for="loginPassword" style="margin-bottom:0;">Password</label>
          <a href="#" style="font-size:0.8rem; color: var(--primary); font-weight:600;">Forgot?</a>
        </div>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">lock</span>
          <input class="form-input" type="password" id="loginPassword" placeholder="••••••••"
                 onkeydown="if(event.key==='Enter') styledLogin()">
          <span class="material-symbols-outlined input-icon-right" onclick="togglePwd('loginPassword', this)">visibility</span>
        </div>
      </div>

      <!-- Stay signed in -->
      <div class="checkbox-row" style="margin-bottom: var(--sp-5);">
        <input type="checkbox" id="staySignedIn">
        <label for="staySignedIn">Stay signed in for 30 days</label>
      </div>

      <!-- Submit -->
      <button onclick="styledLogin()" class="btn btn-primary btn-full">
        Sign In
        <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
      </button>

      <div class="auth-footer-text">
        Don't have an account? <a href="signup.html">Create Account</a>
      </div>

      <!-- Admin Portal -->
      <a href="admin-login.html" class="admin-portal-link">
        <span class="material-symbols-outlined" style="font-size:16px; opacity:0.6;">lock</span>
        Access PetroTrack Admin Portal
      </a>

    </div>
  </main>

  <!-- Footer -->
  <footer class="auth-page-footer">
    <p>© 2024 PetroTrack Systems. All rights reserved.</p>
    <div class="auth-page-footer-links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Support</a>
    </div>
  </footer>

  <script>
    function togglePwd(id, icon) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        icon.textContent = "visibility_off";
      } else {
        input.type = "password";
        icon.textContent = "visibility";
      }
    }
  </script>

</body>
</html>
