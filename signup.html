<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | PetroTrack</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script defer src="app.js"></script>
</head>
<body class="auth-page">

  <!-- Topbar -->
  <header class="auth-topbar">
    <a href="index.html" class="auth-brand">
      <span class="material-symbols-outlined auth-brand-icon">local_gas_station</span>
      <span class="auth-brand-name">PetroTrack</span>
    </a>
  </header>

  <!-- Main -->
  <main class="auth-main">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-card-logo">
        <div class="auth-logo-icon">
          <span class="material-symbols-outlined">local_gas_station</span>
        </div>
      </div>

      <div class="auth-heading">Create Account</div>
      <div class="auth-sub">Join the future of fuel tracking</div>

      <!-- Role Tabs -->
      <div class="role-tabs">
        <span class="role-tabs-label">Account Type</span>
        <div class="role-tabs-grid">
          <label class="role-tab">
            <input type="radio" name="signupRole" value="customer" checked>
            <div class="role-tab-icon">🚗</div>
            <div class="role-tab-name">Customer</div>
          </label>
          <label class="role-tab">
            <input type="radio" name="signupRole" value="seller">
            <div class="role-tab-icon">⛽</div>
            <div class="role-tab-name">Seller</div>
          </label>
        </div>
      </div>

      <!-- Hidden select for app.js -->
      <select id="role" style="display:none;">
        <option value="customer">Customer</option>
        <option value="seller">Seller</option>
      </select>

      <!-- Messages -->
      <div class="msg msg-error" id="signupError"></div>
      <div class="msg msg-success" id="signupSuccess"></div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">mail</span>
          <input class="form-input" type="email" id="email" placeholder="name@example.com">
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">lock</span>
          <input class="form-input" type="password" id="password" placeholder="••••••••"
                 onkeydown="if(event.key==='Enter') styledSignUp()">
          <span class="material-symbols-outlined input-icon-right" onclick="togglePwd('password', this)">visibility</span>
        </div>
        <p class="form-hint">Must be at least 6 characters long.</p>
      </div>

      <!-- Terms -->
      <div class="checkbox-row" style="margin-bottom: var(--sp-5);">
        <input type="checkbox" id="terms">
        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</label>
      </div>

      <!-- Submit -->
      <button onclick="styledSignUp()" class="btn btn-primary btn-full" id="signupBtn">
        Create PetroTrack Account
        <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
      </button>

      <div class="auth-footer-text">
        Already have an account? <a href="login.html">Sign In</a>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="auth-page-footer">
    <p>© 2024 PetroTrack Systems. All rights reserved.</p>
    <div class="auth-page-footer-links">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Contact Support</a>
    </div>
  </footer>

  <script>
    // Sync radio to hidden select
    document.querySelectorAll('input[name="signupRole"]').forEach(r => {
      r.addEventListener("change", () => {
        document.getElementById("role").value = r.value;
      });
    });

    function togglePwd(id, icon) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        icon.textContent = "visibility_off";
      } else {
        input.type = "password";
        icon.textContent = "visibility";
      }
    }
  </script>

</body>
</html>
