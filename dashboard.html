<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard | PetroTrack</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script defer src="app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      checkUser("customer");
      const user = JSON.parse(localStorage.getItem("currentUser"));
      if (!user) { window.location.href = "login.html"; return; }
      document.getElementById("userEmail").textContent = user.email;
      loadApprovedStations();
      loadNotifications();

      document.getElementById("searchInput").addEventListener("input", function () {
        loadApprovedStations(this.value, document.getElementById("fuelFilter").value, document.getElementById("maxPrice").value);
      });
      document.getElementById("fuelFilter").addEventListener("change", function () {
        loadApprovedStations(document.getElementById("searchInput").value, this.value, document.getElementById("maxPrice").value);
      });
      document.getElementById("maxPrice").addEventListener("input", function () {
        loadApprovedStations(document.getElementById("searchInput").value, document.getElementById("fuelFilter").value, this.value);
      });
    });
  </script>
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">
        <span class="material-symbols-outlined">local_gas_station</span>
      </div>
      <div>
        <div class="brand-name">PetroTrack</div>
        <div class="brand-tagline">Fuel Network</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Main</div>
      <div class="nav-link active">
        <span class="material-symbols-outlined">dashboard</span> Dashboard
      </div>
      <div class="nav-link" onclick="document.getElementById('approvedStations').scrollIntoView({behavior:'smooth'})">
        <span class="material-symbols-outlined">local_gas_station</span> Stations
      </div>
      <div class="nav-link" onclick="document.getElementById('searchInput').focus()">
        <span class="material-symbols-outlined">search</span> Search
      </div>
      <div class="nav-label">Tools</div>
      <a href="settings.html" class="nav-link" style="text-decoration:none;">
        <span class="material-symbols-outlined">settings</span> Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="logoutBtn" class="btn btn-logout">
        <span class="material-symbols-outlined" style="font-size:18px;">logout</span> Logout
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Fuel Dashboard</div>
        <div class="topbar-subtitle">Current local prices and station availability</div>
      </div>
      <div class="topbar-right">
        <span class="badge badge-active">
          <span class="badge-dot"></span> LIVE
        </span>
        <div class="notif-bell-wrap">
          <button class="notif-bell-btn" onclick="toggleNotifPanel()">
            <span class="material-symbols-outlined">notifications</span>
            <span class="notif-badge" id="notifBadge" style="display:none;"></span>
          </button>
          <div class="notif-panel" id="notifPanel">
            <div class="notif-panel-header">
              <div class="notif-panel-title">Notifications</div>
              <button onclick="markAllRead()" class="btn btn-ghost btn-sm">Mark all read</button>
            </div>
            <div class="notif-list" id="notifList"></div>
          </div>
        </div>
        <div class="topbar-badge">
          <span class="material-symbols-outlined" style="font-size:16px;">person</span>
          <span id="userEmail">—</span>
        </div>
      </div>
    </header>

    <main class="page-body">
      <!-- Search -->
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍  Search stations or locations…">
        <select id="fuelFilter">
          <option value="">⛽ Fuel Type: All</option>
          <option value="petrol">⛽ Petrol (PMS)</option>
          <option value="diesel">🛢 Diesel (AGO)</option>
          <option value="kerosene">🔥 Kerosene (DPK)</option>
          <option value="lpg">🫙 LPG / Cooking Gas</option>
        </select>
        <input type="number" id="maxPrice" placeholder="₦ Max Price" style="flex:0.6; min-width:120px;">
      </div>

      <!-- Stations Grid -->
      <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px;" id="approvedStations">
        <div class="empty">
          <div class="empty-icon">⛽</div>
          <div class="empty-text">Loading stations…</div>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
